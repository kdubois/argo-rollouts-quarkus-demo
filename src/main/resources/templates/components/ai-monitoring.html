<!-- AI Monitoring Panel Component -->
<div>
    <div class="ai-panel" id="aiPanel">
        <div class="ai-header">
            <div class="ai-icon" id="aiIcon">🤖</div>
            <div class="ai-status-text">
                <div class="ai-status-title" id="aiStatusTitle">AI Analysis</div>
                <div class="ai-status-subtitle" id="aiStatusSubtitle">Monitoring deployment health</div>
            </div>
        </div>
        <div class="ai-metrics" id="aiMetrics">
            <div class="ai-metric">
                <div class="ai-metric-value" id="stableSuccessRate">--</div>
                <div class="ai-metric-label">Stable Success Rate</div>
            </div>
            <div class="ai-metric">
                <div class="ai-metric-value" id="canarySuccessRate">--</div>
                <div class="ai-metric-label">Canary Success Rate</div>
            </div>
            <div class="ai-metric">
                <div class="ai-metric-value" id="aiRequests">--</div>
                <div class="ai-metric-label">Total Requests</div>
            </div>
        </div>
        <div class="ai-graph-container">
            <div class="ai-graph-title">Success Rate Trend</div>
            <canvas id="successRateGraph" width="400" height="120"></canvas>
            <div class="ai-graph-legend">
                <span class="ai-graph-legend-text">- - - 95% threshold</span>
            </div>
        </div>
        <div class="ai-decision" id="aiDecision">
            <div class="ai-decision-title" id="aiDecisionTitle">Monitoring</div>
            <div class="ai-decision-message" id="aiDecisionMessage">
                The AI agent continuously analyzes deployment metrics to determine rollout health.
            </div>
            <div class="error-log-container" id="errorLogContainer" style="display: none;">
                <div class="error-log-header" onclick="toggleErrorLog()">
                    <span>📋 Error Details</span>
                    <span class="error-log-toggle" id="errorLogToggle">▼</span>
                </div>
                <div class="error-log-content" id="errorLogContent">
                    <div class="error-log-text" id="errorLogText"></div>
                </div>
            </div>
        </div>
    </div>
</div>
