<!-- Live Request Flow Component -->
<div>
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">Live Request Flow</h2>
        </div>
        <div class="request-visualization" id="requestVisualization"></div>
        <div class="request-flow-legend">
            <div class="request-flow-legend-item">
                <div class="request-flow-legend-dot stable"></div>
                <span class="request-flow-legend-label">Stable</span>
            </div>
            <div class="request-flow-legend-item">
                <div class="request-flow-legend-dot canary-success"></div>
                <span class="request-flow-legend-label">Canary Success</span>
            </div>
            <div class="request-flow-legend-item">
                <div class="request-flow-legend-dot canary-error"></div>
                <span class="request-flow-legend-label">Canary Error</span>
            </div>
        </div>
    </div>
</div>
