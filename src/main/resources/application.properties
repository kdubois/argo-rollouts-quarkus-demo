# Application Configuration
quarkus.application.name=argo-rollouts-quarkus-demo
quarkus.http.port=8080

# Health Check Configuration
quarkus.smallrye-health.ui.always-include=true
quarkus.smallrye-health.ui.root-path=/q/health-ui

# Micrometer/Prometheus Configuration
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics
quarkus.micrometer.binder.http-server.enabled=true
quarkus.micrometer.binder.jvm.enabled=true

# Enable percentile histograms for latency metrics
quarkus.micrometer.binder.http-server.percentiles=0.5,0.95,0.99
quarkus.micrometer.binder.http-server.histogram.enabled=true

# Scenario Configuration
scenario.mode=${SCENARIO_MODE:happy}
app.version=${APP_VERSION:1.0.5}

# Rollout Configuration
rollout.name=${ROLLOUT_NAME:quarkus-demo}
rollout.namespace=${ROLLOUT_NAMESPACE:quarkus-demo}

# Logging
quarkus.log.level=INFO
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# CORS Configuration (for dashboard)
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

# Container Image Configuration
quarkus.container-image.registry=quay.io
quarkus.container-image.group=kevindubois
quarkus.container-image.name=argo-rollouts-quarkus-demo
quarkus.container-image.tag=${app.version}

quarkus.podman.platform=linux/amd64

# Web Bundler Configuration - disable since we're using Qute templates
quarkus.web-bundler.enabled=false
