apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: quarkus-demo

resources:
- namespace.yaml
- rbac.yaml
- service-stable.yaml
- service-canary.yaml
- gateway.yaml
- analysistemplate.yaml
- rollout.yaml

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/name: quarkus-demo
  app.kubernetes.io/part-of: argo-rollouts-demo

# Image configuration - can be overridden with kustomize edit set image
images:
- name: ghcr.io/kdubois/argo-rollouts-quarkus-demo
  newTag: latest

# ConfigMap generator for application configuration (optional)
# configMapGenerator:
# - name: quarkus-demo-config
#   literals:
#   - SCENARIO_MODE=success
#   - APP_VERSION=1.0.0