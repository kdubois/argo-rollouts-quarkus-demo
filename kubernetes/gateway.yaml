apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: quarkus-demo-gateway
  namespace: quarkus-demo
spec:
  gatewayClassName: istio
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: quarkus-demo-route
  namespace: quarkus-demo
spec:
  parentRefs:
  - name: quarkus-demo-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: quarkus-demo-stable
      port: 8080
      weight: 100
    - name: quarkus-demo-canary
      port: 8080
      weight: 0