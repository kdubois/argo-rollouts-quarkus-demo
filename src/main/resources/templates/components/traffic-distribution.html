<!-- Traffic Distribution Component -->
<div>
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">Traffic Distribution</h2>
        </div>
        <div class="traffic-visual" id="trafficVisual">
            <div class="traffic-segment traffic-stable" id="stableSegment" style="width: 100%">
                <span id="stablePercentage">100%</span>
            </div>
            <div class="traffic-segment traffic-canary" id="canarySegment" style="width: 0%">
                <span id="canaryPercentage">0%</span>
            </div>
        </div>
        <div class="traffic-legend">
            <div class="legend-item">
                <div class="legend-color" style="background: linear-gradient(135deg, #1e40af, #3b82f6);"></div>
                <span class="legend-label">Stable Version</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" id="canaryLegendColor" style="background: linear-gradient(135deg, #059669, #10b981);"></div>
                <span class="legend-label">Canary Version</span>
            </div>
        </div>
    </div>
</div>
