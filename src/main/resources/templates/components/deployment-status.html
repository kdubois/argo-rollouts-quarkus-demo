<!-- Deployment Status Component -->

            <h2 class="card-title">Deployment Status</h2>
        </div>
        <div class="metrics-grid">
            <div class="metric-card deployment-status-grid">
                <div class="metric-label">Current Phase</div>
                <div class="metric-value deployment-status-value" id="deploymentStatusValue">--</div>
            </div>
            <div class="metric-card deployment-status-grid">
                <div class="metric-label">Rollout Message</div>
                <div class="metric-value deployment-status-message" id="rolloutMessage">--</div>
            </div>
        </div>
    </div>
</div>
