apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: demo-app
  namespace: demo-app
spec:
  replicas: 3
  revisionHistoryLimit: 2
  minReadySeconds: 10
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
        sidecar.istio.io/inject: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/q/metrics"
    spec:
      containers:
      - name: demo-app
        image: quay.io/kevindubois/argo-rollouts-quarkus-demo:1.0.0
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: SCENARIO_MODE
          value: "happy"
        - name: APP_VERSION
          value: "1.0.0"
        livenessProbe:
          httpGet:
            path: /q/health/live
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /q/health/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
  strategy:
    canary:
      # Add revision labels to stable and canary pods
      stableMetadata:
        labels:
          role: stable
      canaryMetadata:
        labels:
          role: canary
      analysis:
        startingStep: 1 # Start analysis after first weight change
        args:
        - name: service-name
          value: demo-app-canary.demo-app.svc.cluster.local
        - name: stable-pod-label
          value: app=demo-app,role=stable
        - name: canary-pod-label
          value: app=demo-app,role=canary
        - name: namespace
          value: demo-app
        - name: canary-pod
          valueFrom:
            podTemplateHashValue: Latest
        templates:
        - templateName: ai-analysis
      canaryService: demo-app-canary
      stableService: demo-app-stable
      trafficRouting:
        istio:
          virtualService:
            name: demo-app-vsvc
            routes:
            - primary
      steps:
      - setWeight: 20
      - pause: { duration: 30s } # Collect initial metrics
      - setWeight: 50
      - pause: { duration: 60s } # Let AI analyze the deployment
      - setWeight: 100
      - pause: { duration: 20s } # Complete rollout

